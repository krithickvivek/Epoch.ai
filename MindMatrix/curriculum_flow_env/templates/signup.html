<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <script>(function(){var t=localStorage.getItem('epoch-theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Epoch.ai</title>
    <link rel="stylesheet" href="/static/css/style.css?v=36">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card auth-card-wide">
            <div class="auth-logo">
                <div class="auth-mark"><svg width="26" height="26" viewBox="0 0 22 22" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,18 6,13 10,15 15,8 20,4"/><polyline points="17,4 20,4 20,7"/></svg></div>
            </div>
            <h1>Join Epoch</h1>
            <p class="auth-subtitle">Create your account to start learning</p>

            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/signup" class="auth-form signup-grid">
                <input type="hidden" name="bio" id="su-bio-val" value="">
                <input type="hidden" name="profile_pic" value="">

                <div class="signup-left">
                    <div class="form-group">
                        <label>FULL NAME</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            <input type="text" name="name" placeholder="John Doe" class="input-field" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>EMAIL ADDRESS</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                            <input type="email" name="email" placeholder="you@example.com" class="input-field" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>PASSWORD</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            <input type="password" name="password" id="password" placeholder="Min. 6 characters" class="input-field" required minlength="6">
                            <button type="button" class="toggle-password" onclick="togglePassword('password')">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>CONFIRM PASSWORD</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            <input type="password" name="confirm_password" placeholder="Re-enter password" class="input-field" required>
                        </div>
                    </div>
                </div>
                <div class="signup-right">
                    <div class="form-group">
                        <label>ROLE</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                            <select name="role" class="input-field">
                                <option value="">Select role...</option>
                                <option value="student">Student</option>
                                <option value="professional">Professional</option>
                                <option value="educator">Educator</option>
                                <option value="self_learner">Self Learner</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>EXPERIENCE LEVEL</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                            <select name="experience_level" class="input-field">
                                <option value="">Select level...</option>
                                <option value="beginner">Beginner</option>
                                <option value="intermediate">Intermediate</option>
                                <option value="advanced">Advanced</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>ORGANIZATION <span class="optional">(optional)</span></label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                            <input type="text" name="organization" placeholder="University or company" class="input-field">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>WHAT DESCRIBES YOU <span class="optional">(pick up to 3)</span></label>
                        <div class="su-traits-grid" id="su-traits-grid">
                            <button type="button" class="su-trait" data-t="Curious Learner">Curious Learner</button>
                            <button type="button" class="su-trait" data-t="Goal-Oriented">Goal-Oriented</button>
                            <button type="button" class="su-trait" data-t="Problem Solver">Problem Solver</button>
                            <button type="button" class="su-trait" data-t="Team Player">Team Player</button>
                            <button type="button" class="su-trait" data-t="Self-Motivated">Self-Motivated</button>
                            <button type="button" class="su-trait" data-t="Fast Learner">Fast Learner</button>
                            <button type="button" class="su-trait" data-t="Analytical Mind">Analytical Mind</button>
                            <button type="button" class="su-trait" data-t="Competitive">Competitive</button>
                        </div>
                    </div>
                </div>
                <div class="signup-submit">
                    <button type="submit" class="btn-primary btn-full">Create Account &rarr;</button>
                </div>
            </form>
            <p class="auth-footer">Already have an account? <a href="/login">Sign in</a></p>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
    <script>
    (function(){
        var grid = document.getElementById('su-traits-grid');
        var bioVal = document.getElementById('su-bio-val');
        if(!grid||!bioVal) return;
        grid.querySelectorAll('.su-trait').forEach(function(c){
            c.addEventListener('click', function(){
                if(c.classList.contains('active')){c.classList.remove('active');}
                else{if(grid.querySelectorAll('.su-trait.active').length>=3)return;c.classList.add('active');}
                var n=[];grid.querySelectorAll('.su-trait.active').forEach(function(a){n.push(a.dataset.t);});
                bioVal.value=n.join(', ');
            });
        });
    })();
    </script>
</body>
</html>
