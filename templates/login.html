<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <script>(function(){var t=localStorage.getItem('epoch-theme');if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Epoch.ai</title>
    <link rel="stylesheet" href="/static/css/style.css?v=42">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-mark"><svg width="26" height="26" viewBox="0 0 22 22" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,18 6,13 10,15 15,8 20,4"/><polyline points="17,4 20,4 20,7"/></svg></div>
            </div>
            <h1>Welcome Back</h1>
            <p class="auth-subtitle">Sign in to continue learning</p>

            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login" class="auth-form">
                <div class="form-group">
                    <label>EMAIL ADDRESS</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        <input type="email" name="email" placeholder="you@example.com" class="input-field" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>PASSWORD</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" name="password" id="password" placeholder="Enter your password" class="input-field" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-check">
                    <input type="checkbox" name="remember" id="remember">
                    <label for="remember">Remember me</label>
                </div>
                <button type="submit" class="btn-primary btn-full">
                    <svg width="18" height="18" viewBox="0 0 28 28" fill="none">
                        <path d="M4 20L10 10L16 15L24 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    Sign In to Epoch &rarr;
                </button>
            </form>
            <p class="auth-footer">Don't have an account? <a href="/signup">Sign up</a></p>
            <p class="auth-footer"><a href="/">Continue as Guest</a></p>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
